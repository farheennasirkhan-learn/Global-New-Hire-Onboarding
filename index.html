<div class="mod-s15">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" rel="stylesheet">

  <style>
    .mod-s15,
    .mod-s15 * {
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .mod-s15 .material-symbols-rounded {
      font-family: 'Material Symbols Rounded' !important;
      font-weight: normal;
      font-style: normal;
      font-size: 20px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      font-feature-settings: 'liga';
      -webkit-font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 0, 'wght' 600, 'GRAD' 0, 'opsz' 24;
    }
    .mod-s15 {
      width: 100vw;
      height: 100vh;
      max-height: 100vh;
      background-color: #dbeafe;
      background-image: 
        radial-gradient(circle at 55% 35%, rgba(163, 230, 53, 0.85) 0%, rgba(250, 204, 21, 0.6) 15%, rgba(244, 114, 182, 0.5) 30%, rgba(192, 132, 252, 0.3) 50%, transparent 70%),
        radial-gradient(circle at 10% 20%, rgba(216, 180, 254, 0.8) 0%, transparent 50%),
        radial-gradient(circle at 90% 85%, rgba(56, 189, 248, 0.9) 0%, transparent 60%),
        radial-gradient(circle at 20% 90%, rgba(96, 165, 250, 0.6) 0%, transparent 60%);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 16px 20px;
    }
    .mod-s15__wrapper {
      max-width: 100%;
      width: 100%;
      height: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 20px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.08),
                  inset 0 1px 0 0 rgba(255, 255, 255, 0.8),
                  inset 0 -1px 0 0 rgba(255, 255, 255, 0.3),
                  0 0 0 0.5px rgba(255, 255, 255, 0.5);
      overflow: hidden;
      position: relative;
    }
    .mod-s15__header {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 0.5px solid rgba(0, 0, 0, 0.08);
      color: #0f172a;
      padding: 8px 22px;
      display: flex;
      align-items: baseline;
      gap: 12px;
      z-index: 10;
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
      flex-wrap: wrap;
    }
    .mod-s15__title-group {
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    .mod-s15__title {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .mod-s15__title::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #84cc16;
      border-radius: 50%;
      box-shadow: 0 0 10px #84cc16;
    }
    .mod-s15__hint {
      font-size: 1.15rem;
      font-weight: 600;
      color: #475569;
    }
    .mod-s15__viewer {
      flex: 1;
      padding: 8px 16px 0;
      position: relative;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .mod-s15__frame-container {
      flex: 1;
      width: 100%;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05),
                  0 0 0 0.5px rgba(0, 0, 0, 0.08);
      position: relative;
    }
    .mod-s15__frame {
      width: 113.64%;
      height: 113.64%;
      border: none;
      display: block;
      transform: scale(0.88);
      transform-origin: top left;
    }
    .mod-s15__controls {
      padding: 8px 22px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 0.5px solid rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      z-index: 20;
      flex-wrap: wrap;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.02);
    }
    .mod-s15__btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      font-size: 0.85rem;
      font-weight: 600;
      border: none;
      border-radius: 9999px;
      background: #0f172a;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
    }
    .mod-s15__btn:hover:not(:disabled) {
      background: #1e293b;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.25);
    }
    .mod-s15__btn:disabled {
      background: #f1f5f9;
      color: #94a3b8;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }
    .mod-s15__counter {
      font-size: 0.85rem;
      font-weight: 500;
      color: #64748b;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }
    .mod-s15__counter strong {
      color: #0f172a;
      font-weight: 700;
    }
    .mod-s15__progress {
      height: 4px;
      background: #f1f5f9;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
    }
    .mod-s15__progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #84cc16, #c084fc);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @media (max-width: 700px) {
      .mod-s15 { padding: 6px 4px; }
      .mod-s15__header { padding: 10px 16px; }
      .mod-s15__viewer { padding: 8px 12px 0; }
      .mod-s15__frame-container { border-radius: 8px; }
      .mod-s15__controls { padding: 10px 16px; justify-content: center; }
      .mod-s15__btn { padding: 8px 16px; font-size: 0.8rem; flex: 1 1 auto; justify-content: center; }
      .mod-s15__counter { order: -1; width: 100%; text-align: center; margin-bottom: 2px; }
      .mod-s15__hint { font-size: 1rem; }
    }
  </style>

  <div class="mod-s15__wrapper">
    <div class="mod-s15__header">
      <div class="mod-s15__title-group">
        <span class="mod-s15__title">Global New Hire Onboarding Experience</span>
        <span class="mod-s15__hint">(Click or hover to explore)</span>
      </div>
    </div>

    <div class="mod-s15__viewer">
      <div class="mod-s15__frame-container">
        <iframe id="demoFrame" class="mod-s15__frame" src="A Practical Guide to the P&L 0.html" title="Module slide preview"></iframe>
        <div class="mod-s15__progress">
          <div class="mod-s15__progress-bar" id="progressBar" style="width: 5.56%"></div>
        </div>
      </div>
    </div>

    <div class="mod-s15__controls">
      <button id="prevBtn" class="mod-s15__btn" type="button">
        <span class="material-symbols-rounded" aria-hidden="true">arrow_back</span>
        Previous
      </button>
      <span class="mod-s15__counter">
        Slide <strong><span id="current">1</span></strong> of 17
      </span>
      <button id="nextBtn" class="mod-s15__btn" type="button">
        Next
        <span class="material-symbols-rounded" aria-hidden="true">arrow_forward</span>
      </button>
    </div>
  </div>

  <script>
    (function(){
      var root = document.currentScript.closest('.mod-s15');
      if(!root) return;

      var files = [
        "IT & Infosec.html",
        "Slack and Hibob 0.html",
        "Welcome to Turing 0.html",
        "Welcome to Turing 1.html",
        "Welcome To Turing 2.html",
        "Welcome to Turing 3.html",
        "Welcome to Turing 4.html",
        "A Practical Guide to the P&L 0.html",
        "A Practical Guide to the P&L 1.html",
        "A Practical Guide to the P&L 2.html",
        "A Practical Guide to the P&L 3.html",
        "Onboarding Dashboard Demo.html",
        "Setting Up Your New Wallet 0.html",
        "Slack and Hibob 1.html",
        "Turing Foundations 0.html",
        "Turing Foundations 1.html",
        "Turing Foundations 2.html"
      ];

      var currentIndex = 0;
      var frame = root.querySelector('#demoFrame');
      var currentEl = root.querySelector('#current');
      var progressBar = root.querySelector('#progressBar');
      var prevBtn = root.querySelector('#prevBtn');
      var nextBtn = root.querySelector('#nextBtn');

      function update() {
        var targetFile = files[currentIndex];
        frame.src = targetFile;
        currentEl.textContent = currentIndex + 1;
        progressBar.style.width = ((currentIndex + 1) / files.length * 100) + '%';
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === files.length - 1;
      }

      nextBtn.addEventListener('click', function(){
        if(currentIndex < files.length - 1){
          currentIndex++;
          update();
        }
      });

      prevBtn.addEventListener('click', function(){
        if(currentIndex > 0){
          currentIndex--;
          update();
        }
      });

      frame.addEventListener('error', function() {
        console.warn("Could not load slide: " + files[currentIndex]);
      });

      update();
    })();
  </script>
</div>
